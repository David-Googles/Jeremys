<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px calc(72px + env(safe-area-inset-bottom));
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 1100px;
  margin: 0 auto;
}

.dash-title {
  margin: 0 0 24px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Bento Grid ===== */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  gap: 14px;
  grid-auto-flow: dense;
}
@media (max-width: 720px) {
  .bento-grid {
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 168px;
  }
  .big { grid-row: span 1; }
}
@media (max-width: 440px) {
  .bento-grid {
    grid-template-columns: 1fr;
    grid-auto-rows: 140px;
  }
  .big, .wide { grid-column: 1 / -1; }
}

.bento-card {
  display: block;
  text-decoration: none;
  position: relative;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.025);
  border: 1px solid rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px) saturate(1.2);
  padding: 16px 18px;
  transition: transform 0.2s ease, border-color 0.2s ease;
  overflow: hidden;
}
.bento-card:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
}
.bento-card:hover .bento-arrow {
  transform: translateX(2px);
}

.bento-number {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.bento-emoji {
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 22px;
  filter: drop-shadow(0 0 12px var(--accent-glow));
}
.bento-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin: 8px 0 4px;
}
.bento-spacer { flex: 1; }
.bento-footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: auto;
}
.bento-subtitle {
  font-size: 11px;
  color: var(--text-tertiary);
}
.bento-arrow {
  font-size: 16px;
  color: var(--accent);
  transition: transform 0.2s ease;
}

/* Big tiles: span 2 cols + 2 rows */
.big {
  grid-column: span 2;
  grid-row: span 2;
}

/* Wide tiles: span 2 cols */
.wide {
  grid-column: span 2;
}

/* Tile-specific accent colors */
.tile-main    { --accent: #6BE3A4; --accent-glow: rgba(107, 227, 164, 0.6); }
.tile-fitness { --accent: #7DD3FC; --accent-glow: rgba(125, 211, 252, 0.6); }
.tile-health  { --accent: #A7F3D0; --accent-glow: rgba(167, 243, 208, 0.6); }
.tile-water   { --accent: #60A5FA; --accent-glow: rgba(96, 165, 250, 0.6); }
.tile-finance { --accent: #F2C063; --accent-glow: rgba(242, 192, 99, 0.6); }
</style>
</head>
<body>

<div class="page">

  <h1 class="dash-title">Dashboard</h1>

  <div class="bento-grid">

    <a href="main.html" class="bento-card big tile-main">
      <div class="bento-number">·01</div>
      <span class="bento-emoji">&#x1F3E0;</span>
      <div class="bento-spacer"></div>
      <div class="bento-title">Main</div>
      <div class="bento-footer">
        <span class="bento-subtitle">Goals &amp; daily plan</span>
        <span class="bento-arrow">&#x2192;</span>
      </div>
    </a>

    <a href="gym.html" class="bento-card wide tile-fitness">
      <div class="bento-number">·02</div>
      <span class="bento-emoji">&#x1F4AA;</span>
      <div class="bento-spacer"></div>
      <div class="bento-title">Fitness</div>
      <div class="bento-footer">
        <span class="bento-subtitle">Workouts, splits, sessions</span>
        <span class="bento-arrow">&#x2192;</span>
      </div>
    </a>

    <a href="health.html" class="bento-card tile-health">
      <div class="bento-number">·03</div>
      <span class="bento-emoji">&#x1F49A;</span>
      <div class="bento-spacer"></div>
      <div class="bento-title">Health</div>
      <div class="bento-footer">
        <span class="bento-subtitle">Supplements &amp; vitals</span>
        <span class="bento-arrow">&#x2192;</span>
      </div>
    </a>

    <a href="po-water.html" class="bento-card tile-water">
      <div class="bento-number">·04</div>
      <span class="bento-emoji">&#x1F4A6;</span>
      <div class="bento-spacer"></div>
      <div class="bento-title">Water</div>
      <div class="bento-footer">
        <span class="bento-subtitle">Hydration</span>
        <span class="bento-arrow">&#x2192;</span>
      </div>
    </a>

    <a href="finance.html" class="bento-card wide tile-finance">
      <div class="bento-number">·05</div>
      <span class="bento-emoji">&#x1F4CA;</span>
      <div class="bento-spacer"></div>
      <div class="bento-title">Finance</div>
      <div class="bento-footer">
        <span class="bento-subtitle">Net worth &amp; spending</span>
        <span class="bento-arrow">&#x2192;</span>
      </div>
    </a>

  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  if (typeof initCloudSync !== 'function') return;
  initCloudSync({
    appKey: 'goals',
    syncedPrefixes: ['goals:'],
    onApplied: function () {
      window.dispatchEvent(new CustomEvent('goals-changed'));
      window.dispatchEvent(new Event('storage'));
    }
  });
});
</script>
</body>
</html>
